<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Low-Poly AR Gateway</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #111; 
            font-family: sans-serif;
        }
        #video { display: none; }
        #ui {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="ui">
        <h2 id="status">Accessing 3D Gateway...</h2>
        <p>Please allow camera permissions.</p>
    </div>
    
    <video id="video" autoplay playsinline></video>
    
    <script>
        const video = document.getElementById('video');
        const ui = document.getElementById('ui');

        // 1. Setup Three.js Scene, Camera, and Renderer
        const scene = new THREE.Scene();
        // Give the background a dark grey fog so the edges fade out
        scene.fog = new THREE.Fog(0x111111, 20, 100);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, -30, 40);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. Lighting (Crucial for the 3D low-poly shadows)
        const ambientLight = new THREE.AmbientLight(0x404040, 1.5); // Soft white light
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
        directionalLight.position.set(20, 50, 40);
        scene.add(directionalLight);

        // 3. Create the 3D Plane
        // 60x40 segments keeps the poly-count low for the aesthetic and performance
        const segmentsX = 60;
        const segmentsY = 40;
        const geometry = new THREE.PlaneGeometry(100, 75, segmentsX, segmentsY);
        
        const material = new THREE.MeshStandardMaterial({ 
            color: 0xaaaaaa, // Light grey base
            flatShading: true, // THIS is what gives it the crisp, low-poly look!
            roughness: 0.8,
            metalness: 0.2
        });

        const plane = new THREE.Mesh(geometry, material);
        scene.add(plane);

        // 4. Hidden Canvas to sample video pixels
        const canvas = document.createElement('canvas');
        canvas.width = segmentsX + 1; // Match the number of vertices exactly
        canvas.height = segmentsY + 1;
        const ctx = canvas.getContext('2d', { willReadFrequently: true });

        // 5. Access the Camera
        navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'environment', width: 640, height: 480 }
        }).then(stream => {
            video.srcObject = stream;
            video.play();
            ui.style.display = 'none';
            animate();
        }).catch(err => {
            document.getElementById('status').innerText = "Camera Access Denied";
            console.error(err);
        });

        // 6. Animation and Displacement Loop
        function animate() {
            requestAnimationFrame(animate);

            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                // Draw the video frame to our tiny hidden canvas
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;

                const positions = geometry.attributes.position.array;

                // Loop through every vertex on the plane
                for (let i = 0; i < positions.length / 3; i++) {
                    const r = imgData[i * 4];
                    const g = imgData[i * 4 + 1];
                    const b = imgData[i * 4 + 2];

                    // Calculate brightness (0 to 255)
                    const brightness = (0.3 * r + 0.59 * g + 0.11 * b);

                    // Map brightness to Z-axis height (pushing vertices up/down)
                    // The '15' controls how extreme the 3D spikes are.
                    positions[i * 3 + 2] = (brightness / 255) * 15; 
                }

                // Tell Three.js the vertices have moved
                geometry.attributes.position.needsUpdate = true;
                // Recompute how light hits the faces so shadows update dynamically
                geometry.computeVertexNormals(); 
                
                // Slowly rotate the plane for a cool 3D perspective effect
                plane.rotation.z += 0.002;
            }

            renderer.render(scene, camera);
        }

        // Handle resizing
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
