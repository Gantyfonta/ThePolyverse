<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Voxel AR Gateway</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #888; /* Match the grey sky vibe */
            font-family: sans-serif;
        }
        #video { display: none; }
        #ui {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            text-align: center;
            pointer-events: none;
            z-index: 10;
            background: rgba(0,0,0,0.5);
            padding: 20px;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div id="ui">
        <h2 id="status">Generating Voxel World...</h2>
        <p>Please allow camera permissions.</p>
    </div>
    
    <video id="video" autoplay playsinline></video>
    
    <script>
        const video = document.getElementById('video');
        const ui = document.getElementById('ui');

        // 1. Setup Scene, Camera, Renderer
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x888888); 
        scene.fog = new THREE.Fog(0x888888, 30, 80); // Fog blends the edges

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 45); // Looking straight on at the block wall

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. Lighting (Crucial for seeing the edges of the blocks)
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 20, 30);
        scene.add(dirLight);

        // 3. Create the Voxel Grid using InstancedMesh
        const cols = 80;  // Number of blocks horizontally
        const rows = 60;  // Number of blocks vertically
        const count = cols * rows;
        const boxSize = 0.8; 
        const spacing = 0.85; // Slight gap between blocks

        const geometry = new THREE.BoxGeometry(boxSize, boxSize, boxSize);
        // Matte grey material
        const material = new THREE.MeshStandardMaterial({ 
            color: 0xffffff,
            roughness: 0.9,
            metalness: 0.1
        });

        const mesh = new THREE.InstancedMesh(geometry, material, count);
        mesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage); // Tell Three.js this updates every frame
        scene.add(mesh);

        const dummy = new THREE.Object3D();
        const color = new THREE.Color();

        // Center the grid on the screen
        const offsetX = (cols * spacing) / 2;
        const offsetY = (rows * spacing) / 2;

        // 4. Hidden Canvas for video processing
        const canvas = document.createElement('canvas');
        canvas.width = cols;
        canvas.height = rows;
        const ctx = canvas.getContext('2d', { willReadFrequently: true });

        // 5. Access Camera
        navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'environment', width: cols, height: rows }
        }).then(stream => {
            video.srcObject = stream;
            video.play();
            ui.style.display = 'none';
            animate();
        }).catch(err => {
            document.getElementById('status').innerText = "Camera Access Denied";
            console.error(err);
        });

        // 6. The Voxel Update Loop
        function animate() {
            requestAnimationFrame(animate);

            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;

                let i = 0;
                for (let y = 0; y < rows; y++) {
                    for (let x = 0; x < cols; x++) {
                        // Grab pixel colors
                        const r = imgData[i * 4];
                        const g = imgData[i * 4 + 1];
                        const b = imgData[i * 4 + 2];

                        // Calculate brightness
                        const brightness = (0.3 * r + 0.59 * g + 0.11 * b);
                        
                        // Push brighter things forward, darker things back
                        const zOffset = (brightness / 255) * 15; 

                        // Position each block
                        dummy.position.set(
                            (x * spacing) - offsetX, 
                            -(y * spacing) + offsetY, 
                            zOffset - 10 
                        );
                        dummy.updateMatrix();
                        mesh.setMatrixAt(i, dummy.matrix);

                        // Tint the block based on the grayscale value
                        color.setRGB(brightness/255, brightness/255, brightness/255);
                        mesh.setColorAt(i, color);

                        i++;
                    }
                }
                
                // Let the renderer know the data changed
                mesh.instanceMatrix.needsUpdate = true;
                if(mesh.instanceColor) mesh.instanceColor.needsUpdate = true;

                // Subtle pan to show off the 3D depth
                camera.position.x = Math.sin(Date.now() * 0.001) * 5;
                camera.lookAt(0,0,0);
            }

            renderer.render(scene, camera);
        }

        // Handle resizing
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
